<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Works - Portfolio Manager</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #1f2937;
            font-size: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .upload-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .form-title {
            font-size: 1.5rem;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .works-list {
            background: rgb(239, 236, 236);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .work-card {
            background: #f9fafb;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
        }

        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            border-color: #000000;
        }

        .work-card.featured {
            border-color: #fbbf24;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .work-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 3rem;
        }

        .work-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .work-content {
            padding: 20px;
        }

        .work-category {
            display: inline-block;
            background: linear-gradient(135deg, #000000 0%, #040305 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .work-title {
            font-size: 1.2rem;
            color: #1f2937;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .work-description {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .work-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tag {
            background: #e5e7eb;
            color: #4b5563;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .work-actions {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .work-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.85rem;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fbbf24;
            color: #78350f;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #10b981;
            display: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            display: none;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            width: auto;
            min-width: 200px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .upload-form {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .works-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🎨 Portfolio Works Manager</h1>
                <p style="color: #000000; margin-top: 5px;">Upload and manage your portfolio projects</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="window.location.href='/'">🏠 View Portfolio</button>
                <button class="btn" onclick="window.location.href='/admin.html'">📧 Contacts</button>
            </div>
        </div>

        <div class="main-content">
            <div class="upload-form">
                <h2 class="form-title" id="form-title">➕ Add New Work</h2>

                <div class="success-message" id="success-message"></div>
                <div class="error-message" id="error-message"></div>

                <form id="work-form">
                    <input type="hidden" id="work-id">

                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" name="title" required placeholder="Project Title">
                    </div>

                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Mobile App">Mobile App</option>
                            <option value="UI/UX Design">UI/UX Design</option>
                            <option value="Video Editing">Video Editing</option>
                            <option value="Backend">Backend Development</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Describe your project..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="image_url">Image URL</label>
                        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg">
                        <small style="color: #6b7280; font-size: 0.8rem;">Upload image to a service like Imgur,
                            Cloudinary, or use a direct link</small>
                    </div>

                    <div class="form-group">
                        <label for="video_url">Video URL (YouTube, Vimeo, etc.)</label>
                        <input type="url" id="video_url" name="video_url" placeholder="https://youtube.com/watch?v=...">
                    </div>

                    <div class="form-group">
                        <label for="project_url">Project/Demo URL</label>
                        <input type="url" id="project_url" name="project_url" placeholder="https://project-demo.com">
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="React, Node.js, MongoDB">
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="featured" name="featured">
                            <label for="featured" style="margin: 0;">⭐ Feature this work</label>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%;">💾 Save Work</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()"
                        style="width: 100%; margin-top: 10px; display: none;" id="cancel-btn">❌ Cancel Edit</button>
                </form>
            </div>

            <div class="works-list">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 class="form-title">📁 Your Works (<span id="works-count">0</span>)</h2>
                    <button class="btn" onclick="loadWorks()">🔄 Refresh</button>
                </div>

                <div class="filter-bar">
                    <select id="filter-category" onchange="loadWorks()">
                        <option value="">All Categories</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Mobile App">Mobile App</option>
                        <option value="UI/UX Design">UI/UX Design</option>
                        <option value="Video Editing">Video Editing</option>
                        <option value="Backend">Backend Development</option>
                        <option value="Other">Other</option>
                    </select>
                    <select id="filter-featured" onchange="loadWorks()">
                        <option value="">All Works</option>
                        <option value="true">Featured Only</option>
                    </select>
                </div>

                <div class="works-grid" id="works-grid">
                    <div class="loading">Loading works...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let editingWorkId = null;

        // Load all works
        async function loadWorks() {
            const worksGrid = document.getElementById('works-grid');
            worksGrid.innerHTML = '<div class="loading">Loading works...</div>';

            const category = document.getElementById('filter-category').value;
            const featured = document.getElementById('filter-featured').value;

            let url = '/api/works';
            const params = new URLSearchParams();
            if (category) params.append('category', category);
            if (featured) params.append('featured', featured);
            if (params.toString()) url += '?' + params.toString();

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.success && data.works.length > 0) {
                    document.getElementById('works-count').textContent = data.works.length;
                    worksGrid.innerHTML = data.works.map(work => createWorkCard(work)).join('');
                } else {
                    document.getElementById('works-count').textContent = '0';
                    worksGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-state-icon">📂</div>
                            <h2>No works yet</h2>
                            <p>Start by adding your first project!</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading works:', error);
                worksGrid.innerHTML = `
                    <div class="error-message" style="display: block; grid-column: 1 / -1;">
                        <strong>Error loading works</strong><br>
                        Make sure the server is running on http://localhost:3000
                    </div>
                `;
            }
        }

        // Create work card HTML
        function createWorkCard(work) {
            const tags = work.tags ? work.tags.split(',').map(tag =>
                `<span class="tag">${escapeHtml(tag.trim())}</span>`
            ).join('') : '';

            const imageContent = work.image_url
                ? `<img src="${escapeHtml(work.image_url)}" alt="${escapeHtml(work.title)}">`
                : '🖼️';

            return `
                <div class="work-card ${work.featured ? 'featured' : ''}" style="position: relative;">
                    ${work.featured ? '<div class="featured-badge">⭐ Featured</div>' : ''}
                    <div class="work-image">${imageContent}</div>
                    <div class="work-content">
                        <span class="work-category">${escapeHtml(work.category)}</span>
                        <h3 class="work-title">${escapeHtml(work.title)}</h3>
                        ${work.description ? `<p class="work-description">${escapeHtml(work.description)}</p>` : ''}
                        ${tags ? `<div class="work-tags">${tags}</div>` : ''}
                        ${work.video_url ? `<p style="color: #667eea; font-size: 0.85rem;">🎬 Video available</p>` : ''}
                        ${work.project_url ? `<p style="color: #10b981; font-size: 0.85rem;">🔗 <a href="${escapeHtml(work.project_url)}" target="_blank" style="color: inherit;">View Project</a></p>` : ''}
                        <div class="work-actions">
                            <button class="btn btn-secondary" onclick="editWork(${work.id})">✏️ Edit</button>
                            <button class="btn btn-danger" onclick="deleteWork(${work.id})">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Submit form
        document.getElementById('work-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                image_url: document.getElementById('image_url').value,
                video_url: document.getElementById('video_url').value,
                project_url: document.getElementById('project_url').value,
                tags: document.getElementById('tags').value,
                featured: document.getElementById('featured').checked
            };

            const workId = document.getElementById('work-id').value;
            const url = workId
                ? `/api/works/${workId}`
                : '/api/works';
            const method = workId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess(workId ? 'Work updated successfully!' : 'Work added successfully!');
                    resetForm();
                    loadWorks();
                } else {
                    showError(result.message || 'Failed to save work');
                }
            } catch (error) {
                console.error('Error saving work:', error);
                showError('Error saving work. Make sure the server is running.');
            }
        });

        // Edit work
        async function editWork(id) {
            try {
                const response = await fetch(`/api/works/${id}`);
                const data = await response.json();

                if (data.success) {
                    const work = data.work;
                    document.getElementById('work-id').value = work.id;
                    document.getElementById('title').value = work.title;
                    document.getElementById('description').value = work.description || '';
                    document.getElementById('category').value = work.category;
                    document.getElementById('image_url').value = work.image_url || '';
                    document.getElementById('video_url').value = work.video_url || '';
                    document.getElementById('project_url').value = work.project_url || '';
                    document.getElementById('tags').value = work.tags || '';
                    document.getElementById('featured').checked = work.featured === 1;

                    document.getElementById('form-title').textContent = '✏️ Edit Work';
                    document.getElementById('cancel-btn').style.display = 'block';

                    // Scroll to form
                    document.querySelector('.upload-form').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                console.error('Error loading work:', error);
                showError('Error loading work details');
            }
        }

        // Delete work
        async function deleteWork(id) {
            if (!confirm('Are you sure you want to delete this work?')) {
                return;
            }

            try {
                const response = await fetch(`/api/works/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess('Work deleted successfully!');
                    loadWorks();
                } else {
                    showError(result.message || 'Failed to delete work');
                }
            } catch (error) {
                console.error('Error deleting work:', error);
                showError('Error deleting work');
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('work-form').reset();
            document.getElementById('work-id').value = '';
            document.getElementById('form-title').textContent = '➕ Add New Work';
            document.getElementById('cancel-btn').style.display = 'none';
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('success-message');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => successEl.style.display = 'none', 3000);
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => errorEl.style.display = 'none', 5000);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load works on page load
        loadWorks();
    </script>
</body>

</html>
