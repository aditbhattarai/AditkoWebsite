<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Adit Bhattarai</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #05070a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --error: #f87171;
            --success: #34d399;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
            animation: blobFloat 8s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-blob-1 {
            width: 600px;
            height: 600px;
            background: #6c63ff;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-blob-2 {
            width: 500px;
            height: 500px;
            background: #a78bfa;
            bottom: -200px;
            right: -100px;
            animation-delay: 3s;
        }

        .bg-blob-3 {
            width: 300px;
            height: 300px;
            background: #38bdf8;
            top: 50%;
            left: 50%;
            animation-delay: 1.5s;
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 0 40px rgba(108, 99, 255, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(108, 99, 255, 0.4);
            }

            50% {
                box-shadow: 0 0 60px rgba(108, 99, 255, 0.7);
            }
        }

        .logo-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
            pointer-events: none;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 14px 13px 42px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
        }

        .alert-success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent2);
        }

        .security-note {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(148, 163, 184, 0.5);
            font-size: 0.75rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="grid-overlay"></div>

    <div class="login-wrapper">
        <div class="logo-area">
            <div class="logo-icon">🔐</div>
            <div class="logo-title">Admin Portal</div>
            <div class="logo-subtitle">Adit Bhattarai · Portfolio CMS</div>
        </div>

        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-desc">Sign in to access the administration panel</div>

            <div class="alert alert-error" id="alert-error">
                <span>⚠️</span>
                <span id="alert-error-msg">Invalid credentials. Please try again.</span>
            </div>
            <div class="alert alert-success" id="alert-success">
                <span>✅</span>
                <span>Login successful! Redirecting…</span>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">✉️</span>
                        <input type="email" id="email" name="email" placeholder="admin@example.com" required
                            autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔑</span>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword"
                            title="Toggle password">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <div class="btn-content">
                        <div class="spinner" id="loginSpinner"></div>
                        <span id="loginBtnText">Sign In</span>
                    </div>
                </button>
            </form>

            <div class="security-note">
                🔒 This is a restricted area. All access attempts are logged.
            </div>
        </div>

        <a href="/" class="back-link">← Back to Portfolio</a>
    </div>

    <script>
        // If already logged in, redirect
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.replace('/admin-dashboard.html');
        }

        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginBtnText = document.getElementById('loginBtnText');
        const alertError = document.getElementById('alert-error');
        const alertErrorMsg = document.getElementById('alert-error-msg');
        const alertSuccess = document.getElementById('alert-success');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        function showError(msg) {
            alertError.style.display = 'flex';
            alertSuccess.style.display = 'none';
            alertErrorMsg.textContent = msg;
        }

        function showSuccess() {
            alertError.style.display = 'none';
            alertSuccess.style.display = 'flex';
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            loginSpinner.style.display = loading ? 'block' : 'none';
            loginBtnText.textContent = loading ? 'Signing in…' : 'Sign In';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            setLoading(true);
            alertError.style.display = 'none';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminToken', data.token);
                    sessionStorage.setItem('adminEmail', email);
                    showSuccess();
                    setTimeout(() => {
                        window.location.replace('/admin-dashboard.html');
                    }, 800);
                } else {
                    showError(data.message || 'Invalid credentials. Please try again.');
                    setLoading(false);
                    document.getElementById('password').value = '';
                }
            } catch (err) {
                showError('Cannot connect to server. Make sure the server is running.');
                setLoading(false);
            }
        });
    </script>
</body>

</html>
